# ──────────────────────────────────────────────────────────
# School Management System — Docker Compose
# ──────────────────────────────────────────────────────────
# Configure via .env file (copy from .env.example).
# Deploy:  make deploy   or   docker compose up -d
# ──────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: school-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school}
      POSTGRES_USER: ${POSTGRES_USER:-school}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-school}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school} -d ${POSTGRES_DB:-school}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── ZooKeeper ───────────────────────────────────────────
  zookeeper:
    image: zookeeper:3.9.3
    container_name: school-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: school-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_started
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── MinIO (file storage) ────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: school-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Auth Service (Spring Boot backend) ──────────────────
  auth-service:
    # Use pre-built image if AUTH_SERVICE_IMAGE is set, otherwise build from source
    image: ${AUTH_SERVICE_IMAGE:-school-management/auth-service:latest}
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: school-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-school}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-school}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-school}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Frontend (React SPA via Nginx) ──────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-school-management/frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ── Nginx (reverse proxy — single entrypoint) ──────────
  nginx:
    image: nginx:1.27-alpine
    container_name: school-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - auth-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - school-net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

# ── Volumes ──────────────────────────────────────────────
volumes:
  postgres-data:
    name: school-postgres-data
  minio-data:
    name: school-minio-data

# ── Network ──────────────────────────────────────────────
networks:
  school-net:
    name: school-management-net
    driver: bridge
